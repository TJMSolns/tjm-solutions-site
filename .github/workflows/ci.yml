name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Mondays 8am UTC — catch external link rot

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 1
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          path: build/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  links:
    name: Link check
    runs-on: ubuntu-latest
    needs: [build, deploy]
    # Run on push (after deploy actually completes, so the live site being checked
    # reflects this push) and on schedule (deploy is skipped there; build alone is enough).
    # Skip on PRs to avoid noise from draft content.
    if: |
      always() &&
      needs.build.result == 'success' &&
      (github.event_name == 'schedule' || (github.event_name == 'push' && needs.deploy.result == 'success'))
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: build/
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --base https://www.tjm.solutions
            --accept 200,204,206,301,302,429
            --exclude 'linkedin\.com'
            --exclude 'twitter\.com'
            --exclude 'x\.com'
            './build/**/*.html'
          fail: true
